name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Run Django tests
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: ci-test-secret-key
      DEBUG: "True"
      ALLOWED_HOSTS: 127.0.0.1,localhost

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations check
        run: python manage.py check

      - name: Run unit tests
        run: python manage.py test

  deploy:
    name: Deploy to Heroku
    needs: test
    runs-on: ubuntu-latest
    # Only deploy production code that has passed the test job.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Heroku secrets are optional: when they are not configured the deploy
      # step below is skipped so the workflow stays green (the project is only
      # prepared for deployment, not actually deployed).
      - name: Check Heroku credentials
        id: creds
        run: |
          if [ -z "${{ secrets.HEROKU_API_KEY }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Heroku secrets are not configured - skipping deploy."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Heroku
        if: steps.creds.outputs.configured == 'true'
        uses: akhileshns/heroku-deploy@v3.13.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
